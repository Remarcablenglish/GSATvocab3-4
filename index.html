<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Remarkable English｜馬克精緻語言訓練</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#faf8f3;--ink:#2c2a25;--muted:#7a7568;
  --accent:#c8501a;--accent-light:#fdf0ea;
  --border:#e8e4da;--highlight:#f5f0e8;
  --green-dark:#0B3D1E;
  --gold:#c9a84c;
  --bloom-1:#e8f4fd;--b1t:#1a5f8a;
  --bloom-2:#eaf6ec;--b2t:#1a6b2e;
  --bloom-3:#fef9e7;--b3t:#7d5a00;
  --bloom-4:#fdf2f8;--b4t:#7b2d6e;
  --bloom-5:#fff3e0;--b5t:#8a4500;
  --bloom-6:#f3e5f5;--b6t:#5c2d7a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Noto Sans TC','PingFang TC',sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.6;max-width:680px;margin:0 auto;padding:0 0 80px;}

header{
  background:#00260D;
  padding:16px 20px;
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:18px;
  max-width:680px;
  width:100%;
  margin:0 auto;
  left:0;right:0;
}
.header-logo{
  height:58px;
  width:auto;
  flex-shrink:0;
  object-fit:contain;
}
.header-text{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.header-line1{
  font-family:'Cinzel',Georgia,serif;
  font-size:15px;
  font-weight:700;
  letter-spacing:.04em;
  color:#D1B06B;
  line-height:1.25;
  white-space:nowrap;
}
@media(max-width:480px){
  .header-line1{font-size:12px;letter-spacing:.02em;}
  .header-line2{font-size:11px;}
  .header-line3{font-size:10px;}
  .header-logo{height:48px;}
}
.header-line2{
  font-size:12px;
  color:#c8b98a;
  letter-spacing:.05em;
  font-weight:500;
}
.header-line3{
  font-size:11px;
  color:#D1B06B;
  letter-spacing:.08em;
  opacity:.9;
}
@media(max-width:420px){
  .header-line1{font-size:13px;white-space:normal;}
  .header-logo{height:46px;width:38px;}
}

.top-bar{background:var(--cream);padding:12px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:88px;z-index:90;display:flex;flex-direction:column;gap:8px;margin-top:4px;}

.search-wrap input{width:100%;padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;background:white;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--accent);}

.filter-bar{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-btn.active{background:var(--ink);border-color:var(--ink);color:white;}

.bloom-bar{display:flex;align-items:center;gap:10px;padding:6px 2px;}
.bloom-bar-label{font-size:12px;color:var(--muted);flex:1;}
.bloom-bar-label strong{color:var(--ink);}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:22px;transition:.2s;}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s;}
.toggle-switch input:checked+.toggle-slider{background:var(--accent);}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px);}

.unit-section{border-bottom:1px solid var(--border);}
.unit-header{padding:13px 16px 11px;background:var(--highlight);display:flex;align-items:baseline;gap:8px;cursor:pointer;user-select:none;}
.unit-header h2{font-size:13px;font-weight:600;color:var(--ink);flex:1;}
.unit-arrow{font-size:11px;color:var(--muted);transition:transform .2s;}
.unit-section.collapsed .unit-arrow{transform:rotate(-90deg);}
.unit-section.collapsed .unit-body{display:none;}

/* Level badge on unit */
.lvbadge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0;}
.lv3{background:#e8f0fe;color:#1a3c8a;}
.lv4{background:#e8f5e9;color:#1b5e20;}
.lv5{background:#fff3e0;color:#8a4500;}

.word-card{border-bottom:1px solid var(--border);background:white;}
.word-card-header{padding:12px 16px 10px;display:flex;align-items:baseline;gap:8px;cursor:pointer;}
.word-en{font-size:16px;font-weight:600;color:var(--ink);}
.word-pos{font-size:11px;color:var(--accent);font-weight:500;background:var(--accent-light);padding:2px 6px;border-radius:4px;}
.word-zh{font-size:13px;color:var(--muted);flex:1;}
.expand-arrow{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.word-card.open .expand-arrow{transform:rotate(180deg);}
.word-card-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border);}
.word-card.open .word-card-body{display:block;}

.colloc-section{margin-top:8px;}
.colloc-label{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:4px;}
.colloc-list{display:flex;flex-direction:column;gap:2px;}
.colloc-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border);}
.colloc-item:last-child{border-bottom:none;}
.colloc-en{font-size:13.5px;color:var(--ink);flex:1;font-weight:500;}
.colloc-zh{font-size:12px;color:var(--muted);text-align:right;flex-shrink:0;max-width:50%;}

.writing-tip{margin-top:10px;padding:8px 12px;background:var(--accent-light);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:12px;color:#7a3010;line-height:1.5;}
.writing-tip-label{font-weight:600;font-size:11px;margin-bottom:2px;color:var(--accent);}

.warn-note{margin-top:8px;padding:7px 11px;background:#fff8e1;border-left:3px solid #f9a825;border-radius:0 6px 6px 0;font-size:12px;color:#5d4037;}

/* Bloom */
.scaffold-badge{display:none;font-size:10px;background:#f0ece2;color:#5a5548;padding:1px 6px;border-radius:10px;margin-left:2px;font-weight:normal;}
.bloom-on .scaffold-badge{display:inline;}
.bloom-section{display:none;margin-top:12px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.bloom-on .bloom-section{display:block;}
.bloom-title{font-size:11px;font-weight:600;color:var(--muted);padding:7px 12px 5px;background:var(--highlight);letter-spacing:.05em;text-transform:uppercase;}
.bloom-level{padding:8px 12px;border-top:.5px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.bloom-level-header{display:flex;align-items:center;gap:6px;}
.bloom-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.bloom-level-name{font-size:12px;font-weight:600;}
.bloom-level-content{font-size:12.5px;line-height:1.55;padding-left:24px;color:var(--ink);}
.bloom-level-content .bw{background:#f0ece2;color:#5a5548;padding:1px 5px;border-radius:3px;font-size:11.5px;}
.bl1{background:var(--bloom-1);}.bl1 .bloom-num{background:var(--b1t);color:white;}.bl1 .bloom-level-name{color:var(--b1t);}
.bl2{background:var(--bloom-2);}.bl2 .bloom-num{background:var(--b2t);color:white;}.bl2 .bloom-level-name{color:var(--b2t);}
.bl3{background:var(--bloom-3);}.bl3 .bloom-num{background:var(--b3t);color:white;}.bl3 .bloom-level-name{color:var(--b3t);}
.bl4{background:var(--bloom-4);}.bl4 .bloom-num{background:var(--b4t);color:white;}.bl4 .bloom-level-name{color:var(--b4t);}
.bl5{background:var(--bloom-5);}.bl5 .bloom-num{background:var(--b5t);color:white;}.bl5 .bloom-level-name{color:var(--b5t);}
.bl6{background:var(--bloom-6);}.bl6 .bloom-num{background:var(--b6t);color:white;}.bl6 .bloom-level-name{color:var(--b6t);}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}
.visitor-bar{
  display:flex;align-items:center;gap:6px;
  padding:5px 16px;
  background:#f0ece2;
  border-bottom:1px solid var(--border);
  font-size:12px;color:var(--muted);
}
.visitor-icon{font-size:13px;}
.visitor-label{color:var(--muted);}
.visitor-count{
  font-weight:700;color:#00260D;
  background:#e8f5e9;
  padding:1px 8px;border-radius:10px;
  font-size:12px;
}
</style>
</head>

const BL=[

  {k:'u',n:'理解 Understand',c:'bl2'},

// ─── STATE ────────────────────────────────────────────────────────────────────
let bloomOn=false,filter='all',q='';

// ─── RENDER ──────────────────────────────────────────────────────────────────
function bloomHTML(b){
  if(!b)return'';
  return'<div class="bloom-section"><div class="bloom-title">🎯 Bloom\'s Taxonomy 思考提升</div>'+
    BL.map((l,i)=>`<div class="bloom-level ${l.c}"><div class="bloom-level-header"><div class="bloom-num">${i+1}</div><div class="bloom-level-name">${l.n}</div></div><div class="bloom-level-content">${b[l.k].c}</div></div>`).join('')+
  '</div>';
}

function cardHTML(w){
  const colls=w.colls.map(c=>`<div class="colloc-item"><span class="colloc-en">${c.e}</span><span class="colloc-zh">${c.z}</span></div>`).join('');
  const tip=w.tip?`<div class="writing-tip"><div class="writing-tip-label">✏ 寫作升級</div>${w.tip}</div>`:'';
  const warn=w.warn?`<div class="warn-note">⚠ ${w.warn}</div>`:'';
  const bloomBadge=w.bloom?'<span class="scaffold-badge">🧠 Bloom</span>':'';
  return`<div class="word-card" data-w="${(w.w+' '+w.zh+' '+w.colls.map(c=>c.e+' '+c.z).join(' ')).toLowerCase()}">
    <div class="word-card-header" onclick="this.closest('.word-card').classList.toggle('open')">
      <span class="word-en">${w.w}</span>
      <span class="word-pos">${w.pos}</span>
      <span class="word-zh">${w.zh}</span>${bloomBadge}
      <span class="expand-arrow">▼</span>
    </div>
    <div class="word-card-body">
      <div class="colloc-section"><div class="colloc-label">搭配詞組</div><div class="colloc-list">${colls}</div></div>
      ${tip}${warn}
      ${w.bloom?bloomHTML(w.bloom):''}
    </div>
  </div>`;
}

function render(){
  const list=document.getElementById('wordList');
  const empty=document.getElementById('emptyState');
  document.body.classList.toggle('bloom-on',bloomOn);
  const ql=q.toLowerCase();
  let html='',total=0;
  UNITS.forEach(u=>{
    if(filter!=='all'&&u.lv!==filter)return;
    const ws=u.words.filter(w=>!ql||w.w.toLowerCase().includes(ql)||w.zh.includes(ql)||w.colls.some(c=>c.e.toLowerCase().includes(ql)||c.z.includes(ql)));
    if(!ws.length)return;
    total+=ws.length;
    html+=`<div class="unit-section"><div class="unit-header" onclick="this.closest('.unit-section').classList.toggle('collapsed')"><h2>${u.label}</h2><span class="lvbadge ${u.badge}">${u.lv}</span><span class="unit-arrow">▼</span></div><div class="unit-body">${ws.map(cardHTML).join('')}</div></div>`;
  });
  list.innerHTML=html;
  empty.style.display=total===0?'block':'none';
}

document.getElementById('search').addEventListener('input',e=>{q=e.target.value;render();});
document.getElementById('filterBar').addEventListener('click',e=>{
  const b=e.target.closest('.filter-btn');
  if(!b)return;
  document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');filter=b.dataset.f;render();
});
document.getElementById('bloomToggle').addEventListener('change',e=>{bloomOn=e.checked;render();});
render();

// Fetch visitor count from GoatCounter API
fetch('https://marcz.goatcounter.com/api/v0/stats/total', {
  headers: { 'Content-Type': 'application/json' }
})
.then(r => r.json())
.then(data => {
  const el = document.getElementById('visitorCount');
  if(el && data && data.total !== undefined){
    el.textContent = data.total.toLocaleString() + ' 人';
  } else if(el) {
    el.textContent = '統計中';
  }
})
.catch(()=>{
  const el = document.getElementById('visitorCount');
  if(el) el.textContent = '統計中';
});
</script>
<script data-goatcounter="https://marcz.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
